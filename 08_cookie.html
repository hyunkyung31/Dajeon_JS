<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<!-- cookie : 브라우저에 저장되는 해당사이트의 관련 정보, 해당사이트에 접속할때 자동으로 데이터 전송-->
<body onload = "checkCookie()">  <!-- 페이지 로딩시 발생하는 이벤트-->
    <script>
		function setCookie(cname, cvalue, exdays) { // 키 : 데이터 형식으로 저장된다 , 자동 종료시점을 입력할 수 있다. exdays = expire (종료시점) // 종료시점을 mm초단위로 
			var d = new Date();      
			d.setTime(d.getTime() + (exdays * 24 * 60 * 60 * 1000)); // 이 시간이 지나면 쿠키가 자동으로 만료되어서 종료된다 -> 자동으로 없어진다
			var expires = "expires=" + d.toUTCString(); // UTC 표준시 , 문자열을 바꾸는 함수가 많은 이유가 : 네트워크 왔다갔다해서 
			document.cookie = cname + "=" + cvalue + ";" + expires + ";path=/";
		}
		function getCookie(cname) { //쿠키 가져와라
			var name = cname + "=";
			var ca = document.cookie.split(';'); // 쿠키는 세미콜론;이 분리자
			for (var i = 0; i < ca.length; i++) { // 쿠키를 하나씩 가져온다
				var c = ca[i]; // 0번째 아무것도 없을때까지 계속 돌아간다
				while (c.charAt(0) == ' ') {
					c = c.substring(1); //하나씩 가져온다
				}
				if (c.indexOf(name) == 0) {	// cname이 indexOf의 이름이 찾아지면 
					return c.substring(name.length, c.length); //문자열에서 해당 값을 가져온다 / c.length만큼 글자를 뺀다
				}
			}
			return "";
		}
		function checkCookie() {
			var user = getCookie('username')
			if (user != "") { // 유저가 아무것도 없으면 
				alert("재방문을 환영 합니다." + user); //출력
			} else {
				user = prompt("이름을 입력하세요", ""); //새롭게 입력하게 한다
				if (user != "" && user != null) {
					setCookie("username", user, 30);
				}
			}
		}
		function deleteCookie() { 
			key = prompt("삭제하고자하는 키를 입력하시요", "");
			var covalue = getCookie(key);
			if ( covalue != "") {
				setCookie(key, '' , -1); // set쿠키에 종료시점을 -1을 주면 '즉시' 쿠키 해제한다
				alert("삭제 되었습니다");
			}
			else{
				var ret = confirm("찾고자하는 키가 없습니다. 등록하시겠습니까");
				if (ret == true){
					value = prompt("등록하고자하는 " + key + "의 값을 입력하시요");
					if ( value != "") {
						setCookie(key, value, 1);
					}
					else{
						alert("입력된 값이 없습니다 ");
					}
				}
				else {
					alert("해당키가업습니다. ");
				}
			}
		}
		function findCookie(){
			key = prompt("찾고자하는 하는 키값을 입력하시요", "");
			var covalue = getCookie(key);
			if ( covalue!=""){
				var ret = confirm("찾고자하는 키:"+ key + "의 값 : " +
						covalue + "이 맞습니까" );
				if (ret == true) {
					  alert("당신이 찾고자 하는 값 :   " + covalue +  
							  "입니다.");
					} else {
						alert(" 찾고자 하는 값이 없습니다. .");
					}
            }
			else{
					alert("해당하는 키가 없습니다. ");
				}
			
		}
		</script>
<input type="button" value="쿠키 생성"
	onclick="setCookie('test','cookie 테스트',1)">
<input type="button" value="쿠키 출력" onclick="alert(getCookie('test'))">
<input type="button" value="쿠키 삭제" onclick="setCookie('test','',-1)">
<input type="button" value="이름 쿠키 삭제"
			onclick="setCookie('username','',-1)">
<input type="button" value="키이름 입력 삭제"
			onclick="deleteCookie()">
<input type="button" value="쿠키 탐색" onclick="findCookie()">	
</body>
</html>
